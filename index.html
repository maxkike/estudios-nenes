<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repasos — Estudios</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#334155; --border:#334155;
    --text:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(160deg,#0f172a,#1e293b);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  header{text-align:center;margin-bottom:36px}
  header h1{font-size:30px;font-weight:800;letter-spacing:.5px}
  header p{color:var(--muted);margin-top:8px;font-size:15px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;width:100%;max-width:760px}
  .card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px 22px;transition:transform .15s,border-color .15s,background .15s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);background:#243150}
  .card .ico{font-size:34px}
  .card h2{font-size:20px;font-weight:700;margin:12px 0 4px}
  .card p{color:var(--muted);font-size:13px}
  .card .go{display:inline-block;margin-top:14px;font-size:13px;font-weight:700;color:var(--accent)}
  .card.soon{opacity:.5;pointer-events:none}
  .card.soon .go{color:var(--muted)}
  footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
  <header>
    <h1>📚 Repasos de Estudio</h1>
    <p>Elige tu año para ver los temas</p>
  </header>
  <div class="grid">
    <a class="card" href="noveno/index.html">
      <div class="ico">9️⃣</div>
      <h2>Noveno</h2>
      <p>Repasos y exámenes de 9.º año</p>
      <span class="go">Entrar →</span>
    </a>
    <div class="card soon">
      <div class="ico">➕</div>
      <h2>Más años</h2>
      <p>Próximamente</p>
      <span class="go">Pronto</span>
    </div>
  </div>
  <footer>Hecho con cariño para el estudio 💙</footer>
</body>
</html>
