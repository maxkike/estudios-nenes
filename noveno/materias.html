<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materias — Noveno</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;color:#475569;
    background:linear-gradient(160deg,#fef3f8 0%,#eef4ff 55%,#f0fdf9 100%);
    display:flex;flex-direction:column;align-items:center;padding:34px 20px;
  }
  header{text-align:center;margin-bottom:28px}
  header h1{font-size:24px;font-weight:800;color:#5b5170}
  header p{color:#94a3b8;margin-top:6px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:20px;width:100%;max-width:760px}
  .card{
    display:block;text-decoration:none;color:inherit;border-radius:20px;padding:26px 20px;
    border:1.5px solid rgba(255,255,255,.7);box-shadow:0 6px 18px rgba(148,163,184,.18);
    transition:transform .15s,box-shadow .15s;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(148,163,184,.28)}
  .card .ico{font-size:34px}
  .card h2{font-size:19px;font-weight:800;margin:10px 0 4px;color:#3f3a52}
  .card p{color:#6b7280;font-size:13px;line-height:1.5}
  .card .go{display:inline-block;margin-top:12px;font-size:13px;font-weight:800}
  .menta{background:#dcfce7}  .menta .go{color:#16a34a}
  .durazno{background:#ffe9d6}.durazno .go{color:#ea7c34}
  .cielo{background:#dbeafe}  .cielo .go{color:#2563eb}
  .lila{background:#efe9ff}   .lila .go{color:#7c5cdb}
  .rosa{background:#fce7f3}   .rosa .go{color:#db2777}
  .soon{background:#eef2f7;opacity:.85;pointer-events:none}
  .soon .go{color:#94a3b8}
</style>
</head>
<body>
  <header>
    <h1>Elige una materia</h1>
    <p>Toca una tarjeta para empezar</p>
  </header>
  <div class="grid">
    <a class="card menta" href="repaso-matematicas-examen.html">
      <div class="ico">🔢</div>
      <h2>Matemáticas</h2>
      <p>Repaso para el examen final: productos notables, factorización, ecuaciones, conjuntos y funciones — con ejercicios resueltos.</p>
      <span class="go">Estudiar →</span>
    </a>
    <div class="card soon">
      <div class="ico">➕</div>
      <h2>Más materias</h2>
      <p>Próximamente</p>
      <span class="go">Pronto</span>
    </div>
  </div>
</body>
</html>
