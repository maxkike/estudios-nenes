<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noveno — Repasos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;background:#f6f3fb}

  /* CABECERA FIJA */
  #cab{
    flex:0 0 auto;display:flex;align-items:center;gap:12px;
    padding:12px 16px;background:#efe9ff;border-bottom:1.5px solid #e0d7f7;
    box-shadow:0 2px 8px rgba(148,163,184,.15);
  }
  #cab .btn{
    border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;
    background:#fff;color:#7c5cdb;border:1.5px solid #d9ccf7;border-radius:10px;padding:8px 14px;
    transition:background .15s,transform .15s;white-space:nowrap;
  }
  #cab .btn:hover{background:#f3eeff;transform:translateY(-1px)}
  #cab h1{flex:1;text-align:center;font-size:18px;font-weight:800;color:#5b5170}
  #cab a.btn{text-decoration:none;display:inline-flex;align-items:center}
  #atras{visibility:hidden}

  /* CONTENIDO EN IFRAME */
  #marco{flex:1 1 auto;width:100%;border:0;display:block;background:#fff}

  /* PIE FIJO */
  #pie{
    flex:0 0 auto;text-align:center;padding:10px;font-size:12px;color:#8b93a3;
    background:#efe9ff;border-top:1.5px solid #e0d7f7;
  }
  @media(max-width:480px){#cab h1{font-size:15px} #cab .btn{padding:7px 11px;font-size:13px}}
</style>
</head>
<body>
  <div id="cab">
    <button id="atras" class="btn" onclick="verMaterias()">← Materias</button>
    <h1>9️⃣ Noveno</h1>
    <a class="btn" href="../index.html">🏠 Años</a>
  </div>

  <iframe id="marco" src="materias.html" title="Contenido"></iframe>

  <div id="pie">Noveno año 💜 — Repasos de estudio</div>

<script>
  const marco = document.getElementById('marco');
  const atras = document.getElementById('atras');

  function verMaterias(){ marco.src = 'materias.html?v=' + Date.now(); }

  marco.addEventListener('load', () => {
    let enMenu = true;
    try {
      const p = marco.contentWindow.location.pathname;
      enMenu = p.endsWith('/materias.html') || p.endsWith('materias.html');
    } catch(e){ enMenu = false; }
    atras.style.visibility = enMenu ? 'hidden' : 'visible';
  });
</script>
</body>
</html>
